in_source: |-
  ; Перенаправляем IN -> OUT till '\0'

  @define STDIN  0
  @define STDOUT 3

      .text

  _main:
  _io_stream_loop:
    ( : $STDIN )
    ( port : val ) <= IN

    ( char : char, char ) ; проверка на конец cstr
    ( : 0 )
    ( char, zero : char == zero )
    <? _exit>

    ( : $STDOUT )
    ( val, port : ) => OUT
    <_io_stream_loop>
  _exit:
    <...>
