data_memory_size: 16
text_memory_size: 64
limit: 1500
slice: ["tail", "200"]
view: |-
  PC: {pc:hex} mPC: {mpc:hex} IPF: {iprefetch:hex} IR: {ir:mnemonic} S: {s:dec} Td: {td:dec}
out_data: !!binary |
  AAAAAAAAAAAAAAAAAAAAAA==
out_data_hex: |-
  0...15 - 0x00 - .
out_text: !!binary |
  FAUAAAAcAAAAABoeHAAAAAAPFSIAAAAcAwAAABsUBQAAAAE=
out_text_hex: |-
  0x00000000 - 0x1405000000 - jump 5
  0x00000005 - 0x1c00000000 - push 0
  0x0000000a - 0x1a - in
  0x0000000b - 0x1e - duplicate
  0x0000000c - 0x1c00000000 - push 0
  0x00000011 - 0x0f - is_==
  0x00000012 - 0x1522000000 - jump_if 34
  0x00000017 - 0x1c03000000 - push 3
  0x0000001c - 0x1b - out
  0x0000001d - 0x1405000000 - jump 5
  0x00000022 - 0x01 - halt
