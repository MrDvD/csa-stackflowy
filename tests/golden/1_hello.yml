in_source: |-
  ; Проходимся по массиву в памяти и выводим строку (cstr, не массив напрямую)

  @define WORLD_ADDR 0x1000

      .data@500
      "Hello "

      .data@$WORLD_ADDR
      "World"

  @macro PRINT_CSTR(addr) { ; add macro name + idx so inner labels won't overlap
      ( : %addr ) ; addr
  _print_loop:
      ( addr : addr, addr ) ; addr, addr
      ( : 1 ) ; addr, addr, 1
      ( addr, one : addr + one ) ; addr, addr+1
      ( curr_addr, new_addr : new_addr, curr_addr ) ; addr+1, addr
      ( addr : char ) <= MEM_DATA ; addr+1, char
      ( char : char, char ) ; addr+1, char, char
      ( : 0xFF ) ; addr+1, char, char, mask
      ( char_word, mask : char_word & mask ) ; addr+1, char, masked_char
      ( : 0 ) ; addr+1, char, masked_char, 0
      ( char, zero : char == zero ) ; addr+1, char, is_zero
      ( : 1 )       ; load constant port number ; addr+1, char, is_zero, port
      ( is_null, port_num : port_num, is_null ) ; addr+1, char, port, is_zero
      <? _print_done> ; addr+1, char, port
      ( char, port_num : ) => OUT
      <_print_loop>
  _print_done:
      ( addr : )
  }

      .text

  _main:
      $PRINT_CSTR(500)  ; using defined macros
      $PRINT_CSTR($WORLD_ADDR)
      <...>
port_mapped_io:
  0: [5]
  1: []
  2: []
  3: []
data_memory_size: 5000
limit: 1000
out_data: !!binary |
  UAAAAHAAAAVAAAAAUAAAAGAAAAGAAAAA
out_data_hex: |
  0 - 50000000 - input
  1 - 70000005 - jz 5
  2 - 40000000 - print
  3 - 50000000 - input
  4 - 60000001 - jmp 1
  5 - 80000000 - halt
out_text: !!binary |
  UAAAAHAAAAVAAAAAUAAAAGAAAAGAAAAA
out_text_hex: |-
  0 - 50000000 - input
  1 - 70000005 - jz 5
  2 - 40000000 - print
  3 - 50000000 - input
  4 - 60000001 - jmp 1
  5 - 80000000 - halt
out_stdout: |
  source LoC: 13 code instr: 6
  ============================================================
  foo
  ticks: 21
out_log: |-
  sadsadasd