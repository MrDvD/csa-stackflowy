in_source: |-
  ; Проходимся по массиву в памяти и выводим строку (cstr, не массив напрямую)

  @define WORLD_ADDR 0x1000

      .data@500
      "Hello "

      .data@$WORLD_ADDR
      "World"

  @macro PRINT_CSTR(addr) { ; add macro name + idx so inner labels won't overlap
  _print_loop:
      ( : %addr )
      ( addr : addr, addr )
      ( : 1 )
      ( addr, one : addr + one )
      ( curr_addr, new_addr : new_addr, curr_addr )
      ( addr : char ) <= MEM_DATA
      ( char : char, char )
      ( : 0 )
      ( char, zero : char == zero )
      ( : 1 )       ; load constant port number
      ( is_null, port_num : port_num, is_null )
      <? _print_done>
      ( char, port_num : ) => OUT
      <_print_loop>
  _print_done:
      ( addr : )
  }

      .text

  _main:
      $PRINT_CSTR(500)  ; using defined macros
      $PRINT_CSTR($WORLD_ADDR)
      <...>
in_stdin: |-
data_memory_size: 5000
limit: 1000
out_data: !!binary |
  UAAAAHAAAAVAAAAAUAAAAGAAAAGAAAAA
out_data_hex: |
  0 - 50000000 - input
  1 - 70000005 - jz 5
  2 - 40000000 - print
  3 - 50000000 - input
  4 - 60000001 - jmp 1
  5 - 80000000 - halt
out_text: !!binary |
  UAAAAHAAAAVAAAAAUAAAAGAAAAGAAAAA
out_text_hex: |-
  0 - 50000000 - input
  1 - 70000005 - jz 5
  2 - 40000000 - print
  3 - 50000000 - input
  4 - 60000001 - jmp 1
  5 - 80000000 - halt
out_stdout: |
  source LoC: 13 code instr: 6
  ============================================================
  foo
  ticks: 21
out_log: |-
  sadsadasd