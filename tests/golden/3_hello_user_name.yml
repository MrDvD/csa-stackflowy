in_source: |-
  ; Приветствуем пользователя по имени

  @define STDIN  0
  @define STDOUT 2

  ; полное / краткое приветствие
  ; (для проверки возможностей условной компиляции)
  @define USE_EXTENDED 1

      .data
  _prompt:    "What is your name? "
  _greet_ext: "Hello, "
  _greet_sht: "Hi "
  _excl_addr: "!"
  _buf_addr:

  @macro PRINT(addr) {
      ( : %addr )
      <! _print_string_proc >
  }

  @macro READ(buf) {
      ( : %buf )
      <! _read_string_proc >
  }

      .text

  _main:
      $PRINT(_prompt)

      $READ(_buf_addr)

      @if (USE_EXTENDED == 1) {
          $PRINT(_greet_ext)
      } @else {
          $PRINT(_greet_sht)
      }

      $PRINT(_buf_addr)
      $PRINT(_excl_addr)
      <...>

  _print_string_proc:
  _print_loop:
      ( current_addr : current_addr, current_addr )
      ( addr : char ) <= MEM_DATA
      ( char : char, char )
      ( : 0 )
      ( char, zero : char == zero )
      <? _print_done>
      
      ( : $STDOUT )
      ( char, port : ) => OUT
      
      ( : 1 )
      ( current_addr, one : current_addr + one )
      <_print_loop>

  _print_done:
      ( char : )
      ( current_addr : )
      <RET>

  _read_string_proc:
  _read_loop:
      ( current_addr : current_addr, current_addr )
      ( : $STDIN )
      ( port : char ) <= IN
      
      ( char : char, char )
      ( : 10 )
      ( char, nl : char == nl )
      <? _read_done>
      
      ( char : char, char )
      ( : 0 )
      ( char, zero : char == zero )
      <? _read_done>
      
      ( current_addr, char : char, current_addr )
      ( val, addr : ) => MEM_DATA
      
      ( : 1 )
      ( current_addr, one : current_addr + one )
      <_read_loop>

  _read_done:
      ( char : )
      
      ( current_addr : current_addr, current_addr )
      ( : 0 )
      ( addr, zero : zero, addr )
      ( val, addr : ) => MEM_DATA
      
      ( current_addr : )
      ( base_addr : )
      <RET>
port_mapped_io:
  0: [77, 97, 107, 97, 114, 0]
  1: []
  2: []
  3: []
data_memory_size: 5000
limit: 1500
slice: ["tail", "200"]
view: |-
  PC: {pc:hex} IPF: {iprefetch:hex} IR: {ir:mnemonic} S: {s:hex} Td: {td:dec}
out_data: !!binary |

out_data_hex: |

out_text: !!binary |
  FAUAAAAcAAAAABoeHAAAAAAPFSIAAAAcAwAAABsUBQAAAAE=
out_text_hex: |-
  0 - 0x1405000000 - jump 5
  5 - 0x1c00000000 - push 0
  10 - 0x1a - in
  11 - 0x1e - duplicate
  12 - 0x1c00000000 - push 0
  17 - 0x0f - is_==
  18 - 0x1522000000 - jump_if 34
  23 - 0x1c03000000 - push 3
  28 - 0x1b - out
  29 - 0x1405000000 - jump 5
  34 - 0x01 - halt
out_stdout: |
  outputbuffer[0]: []
  outputbuffer[1]: []
  outputbuffer[2]: []
  outputbuffer[3]: [73, 39, 109, 32, 97, 32, 99, 97, 116]

  ticks: 514
