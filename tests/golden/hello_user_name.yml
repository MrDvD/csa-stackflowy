in_source: |-
  ; Приветствуем пользователя по имени

  @define STDIN  0
  @define STDOUT 2

  ; полное / краткое приветствие
  ; (для проверки возможностей условной компиляции)
  @define USE_EXTENDED 1

      .data@4
  _prompt:    "What is your name?"
  _greet_ext: "Hello, "
  _greet_sht: "Hi "
  _newline:   0xA
  _excl_addr: "!"
  _buffer:    0x0

  @macro PRINT(addr) {
    ( : %addr )
    <! _print_string_proc >
  }

  @macro READ(buf) {
    ( : %buf )
    <! _read_string_proc >
  }

      .text

  _main:
    $PRINT(_prompt)

    $READ(_buffer)

    $PRINT(_newline)

    @if (USE_EXTENDED == 1) {
      $PRINT(_greet_ext)
    } @else {
      $PRINT(_greet_sht)
    }

    $PRINT(_buffer)
    $PRINT(_excl_addr)
    <...>

  _print_string_proc:
  _print_loop:
    ( current_addr : current_addr, current_addr )
    ( addr : char ) <= MEM_DATA
    ( : 0xFF )
    ( full_char, mask : full_char & mask )
    ( char : char, char )
    ( : 0 )
    ( char, zero : char == zero )
    <? _print_done>
    
    ( : $STDOUT )
    ( char, port : ) => OUT
    
    ( : 1 )
    ( current_addr, one : current_addr + one )
    <_print_loop>

  _print_done:
    ( char : )
    ( current_addr : )
    <RET>

  _read_string_proc:
  _read_loop:
    ( current_addr : current_addr, current_addr )
    ( current_addr : current_addr, current_addr )
    ( : $STDIN )
    ( port : char ) <= IN
    
    ( char : char, char )
    ( : 0 )
    ( char, zero : char == zero )
    <? _read_done>
    
    ; read-modify-write
    
    ( current_addr, char : char, current_addr )
    ( addr : old_word ) <= MEM_DATA
    ( : 0xFF )
    ( m : ~m )
    ( w, m : w & m )
    ( char, cleared_word : cleared_word, char )
    ( cleared_word, char : cleared_word | char )
    ( current_addr, final_word : final_word, current_addr )
    ( val, addr : ) => MEM_DATA
    
    ( : 1 )
    ( current_addr, one : current_addr + one )
    <_read_loop>

  _read_done:
    ( char : )
    
    ( current_addr : current_addr, current_addr )
    ( : 0 )
    
    ( current_addr, zero : zero, current_addr )
    ( addr : old_word ) <= MEM_DATA
    ( : 0xFF )
    ( m : ~m )
    ( w, m : w & m )
    ( zero, cleared_word : cleared_word, zero )
    ( cleared_word, zero : cleared_word | zero )
    ( current_addr, final_word : final_word, current_addr )
    ( val, addr : ) => MEM_DATA
    
    ( current_addr : )
    ( base_addr : )
    <RET>
