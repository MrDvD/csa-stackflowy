  22 - 0x72 - r
  23 - 0x35 - 5
  24...31 - 0x00 - .
out_text: !!binary |
  FAUAAAAcBAAAABgcDAAAABgEAh8cFAAAABkcAQAAAAgcAAAAABgfBBwIAAAAGAQcEAAAABkB
out_text_hex: |-
