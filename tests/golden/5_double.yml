  0x00000005 - 0x1c04000000 - push 4
  0x0000000a - 0x18 - load
  0x0000000b - 0x1c0c000000 - push 12
  0x00000010 - 0x18 - load
  0x00000011 - 0x04 - add
  0x00000012 - 0x02 - load_flags
  0x00000013 - 0x1f - swap
  0x00000014 - 0x1c14000000 - push 20
  0x00000019 - 0x19 - store
  0x0000001a - 0x1c01000000 - push 1
  0x0000001f - 0x08 - and
  0x00000020 - 0x1c00000000 - push 0
  0x00000025 - 0x18 - load
  0x00000026 - 0x1f - swap
  0x00000027 - 0x04 - add
  0x00000028 - 0x1c08000000 - push 8
  0x0000002d - 0x18 - load
  0x0000002e - 0x04 - add
  0x0000002f - 0x1c10000000 - push 16
  0x00000034 - 0x19 - store
  0x00000035 - 0x01 - halt
