in_source: |-
  ; Считаем в цикле до нуля (чтобы проверить кеш инструкций)

      .text

  _main:
    ( : 10 )

  _loop:
    ( n : n, n )
    ( : 0 )
    ( n, zero : n == zero )
    <? _exit>

    ( : 1 )
    ( n, one : n - one )
    <_loop>

  _exit:
    ( n : )
    <...>
port_mapped_io:
  0: []
  1: []
  2: []
  3: []
data_memory_size: 32
text_memory_size: 64
limit: 500
slice: ["head", "250"]
view: |-
  PC: {pc:hex} mPC: {mpc:hex} IPF: {iprefetch:hex} IR: {ir:mnemonic} S: {s:dec} Td: {td:dec}
out_data: !!binary |
  AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
out_data_hex: |-
  0...31 - 0x00 - .
out_text: !!binary |
  FAUAAAAcCgAAAB4cAAAAAA8VIQAAABwBAAAABRQKAAAAHQE=
out_text_hex: |-
  0x00000000 - 0x1405000000 - jump 5
  0x00000005 - 0x1c0a000000 - push 10
  0x0000000a - 0x1e - duplicate
  0x0000000b - 0x1c00000000 - push 0
  0x00000010 - 0x0f - is_==
  0x00000011 - 0x1521000000 - jump_if 33
  0x00000016 - 0x1c01000000 - push 1
  0x0000001b - 0x05 - substract
  0x0000001c - 0x140a000000 - jump 10
  0x00000021 - 0x1d - pop
  0x00000022 - 0x01 - halt
out_stdout: |
  outputbuffer[0]: []
  outputbuffer[1]: []
  outputbuffer[2]: []
  outputbuffer[3]: []
  
  ticks: 446
