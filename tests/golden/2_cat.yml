in_source: |-
  ; Перенаправляем IN -> OUT till '\0'

  @define STDIN  0
  @define STDOUT 3

      .text

  _main:
  _io_stream_loop:
    ( : $STDIN )
    ( port : val ) <= IN

    ( char : char, char ) ; проверка на конец cstr
    ( : 0 )
    ( char, zero : char == zero )
    <? _exit>

    ( : $STDOUT )
    ( val, port : ) => OUT
    <_io_stream_loop>
  _exit:
    <...>
port_mapped_io:
  0: [73, 39, 109, 32, 97, 32, 99, 97, 116, 0]
  1: []
  2: []
  3: []
data_memory_size: 16
limit: 1500
slice: ["tail", "200"]
view: |-
  PC: {pc:hex} IPF: {iprefetch:hex} IR: {ir:mnemonic} S: {s:hex} Td: {td:hex}
out_data: !!binary |
  AAAAAAAAAAAAAAAAAAAAAA==
out_data_hex: |-
  0...15 - 0x00 - .
out_text: !!binary |
  FAUAAAAcAAAAABoeHAAAAAAPFSIAAAAcAwAAABsUBQAAAAE=
out_text_hex: |-
  0x00000000 - 0x1405000000 - jump 5
  0x00000005 - 0x1c00000000 - push 0
  0x0000000a - 0x1a - in
  0x0000000b - 0x1e - duplicate
  0x0000000c - 0x1c00000000 - push 0
  0x00000011 - 0x0f - is_==
  0x00000012 - 0x1522000000 - jump_if 34
  0x00000017 - 0x1c03000000 - push 3
  0x0000001c - 0x1b - out
  0x0000001d - 0x1405000000 - jump 5
  0x00000022 - 0x01 - halt
out_stdout: |
  outputbuffer[0]: []
  outputbuffer[1]: []
  outputbuffer[2]: []
  outputbuffer[3]: [73, 39, 109, 32, 97, 32, 99, 97, 116]
  
  ticks: 514
